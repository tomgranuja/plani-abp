# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Planificación ABP
email: scarvajal@comunidadeducativacayuman.cl
description: >- # this means to ignore newlines until "baseurl:"
  Sitio de publicación de planificaciones escolares de aprendizaje basado en proyectos para revisión por colegas.
domain: tomgranuja.github.io
baseurl: "/plani-abp" # the subpath of your site, e.g. /blog
url: "https://my-site.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  tomgranuja

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

