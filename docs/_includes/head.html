<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
      <link href=" https://cdn.jsdelivr.net/npm/modern-normalize@3.0.1/modern-normalize.min.css " rel="stylesheet">

    <style>
      /* ===== Base Styles ===== */

      :root {
        --color-white:#fff;
        --color-gray-100:#f7f7f9;
        --color-gray-200:#efeff3;
        --color-gray-300:#e0e0e3;
        --color-gray-550:#676778;
        --color-black:#000;
        --color-dark-blue:#191d33;
        --color-light-blue:#f6f9fb;
        --color-gray-blue:#a1a4b5;
        --color-blue:#1a42e8;
        --color-green:#37b659;
      }

      body {
        background-color: var(--color-light-blue);
        color: var(--color-dark-blue);
      }

      h1, h2, h3, .display-1, .display-2, .display-3, .display-4, .display-5, .display-6 {
        font-weight: 300;
      }

      .top-title {
        margin-top: 0px;
      }

      .display-1 {
        font-size: 6rem;
      }

      .display-2 {
        font-size: 5.5rem;
      }

      .display-3 {
        font-size: 4.5rem;
      }

      .display-4 {
        font-size: 3.5rem;
      }

      .display-5 {
        font-size: 2.5rem;
      }

      .display-6 {
        font-size: 1.5rem;
      }

      .text-secondary {
        color: var(--color-gray-blue);
      }

      /* ===== Table Styles ===== */
      table {
        border-collapse: collapse;
      }

      td, th {
        border: 1px solid #ddd;
        padding: 8px;
      }

      /*tr:hover {background-color: #ddd;}*/

      h {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: #f2f2f2;
        color: white;
      }

      /* ===== Misc. utils ===== */
      span.content-type-category {
        text-transform: uppercase;
        color: var(--color-blue);
        background-color: var(--color-gray-300);
        padding: 0.2em 0.4em;
        border-radius: 0.4em;
      }

      span.content-type-category::after {
        content: ":"; /* Adds colon */
      }

    </style>
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
</head>
